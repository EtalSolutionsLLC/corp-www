name: ${STACK}
services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./.containers/site-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - proxy
    env_file:
      - ./.env.generated
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.${STACK}-http.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.${STACK}-http.entrypoints=web"
      - "traefik.http.routers.${STACK}-http.service=${STACK}"

      - "traefik.http.routers.${STACK}-https.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.${STACK}-https.entrypoints=websecure"
      - "traefik.http.routers.${STACK}-https.tls=true"
      - "traefik.http.routers.${STACK}-https.service=${STACK}"

      - "traefik.http.services.${STACK}.loadbalancer.server.port=80"

      - "com.etalsolutions.service=${STACK:-}-web"
      - "com.etalsolutions.service_tier=${DEPLOY_ENV}"
      - "com.etalsolutions.managed_by=${MANAGED_BY}"
      - "com.etalsolutions.service_lifecycle=${LIFECYCLE}"
      - "com.etalsolutions.project_id=${PROJECT_ID}"
      - "com.etalsolutions.deployment_id=${DEPLOYMENT_ID}"
      - "com.etalsolutions.stack=${STACK}"
      - "com.etalsolutions.client=${CLIENT}"
      - "com.etalsolutions.owner=${OWNER_ALIAS}"
      - "com.etalsolutions.data_class=${DATA_CLASS}"
      - "com.etalsolutions.data_lifecycle=${DATA_LIFECYCLE}"      
  toolbox:
    profiles:
      - tools
    build:
      context: .
      dockerfile: .containers/site-toolbox/Dockerfile
    working_dir: "${CONTAINER_ROOT}"
    volumes:
      - .:"${CONTAINER_ROOT}"
    environment:
      REPO_ROOT: "${CONTAINER_ROOT}"
      SITE_ROOT: "${CONTAINER_ROOT}/www"
      SITE_DIR: "${SITE_ROOT}"
      PORTMASON_SHARE: "${CONTAINER_ROOT}/portmason"
      LOG_DIR: "${CONTAINER_ROOT}/logs"
    labels:
      - "com.etalsolutions.service=${STACK:-}-toolbox"
      - "com.etalsolutions.service_tier=${DEPLOY_ENV}"
      - "com.etalsolutions.managed_by=${MANAGED_BY}"
      - "com.etalsolutions.project_id=${PROJECT_ID}"
      - "com.etalsolutions.deployment_id=${DEPLOYMENT_ID}"
      - "com.etalsolutions.stack=${STACK}"
      - "com.etalsolutions.client=${CLIENT}"
      - "com.etalsolutions.owner=${OWNER_ALIAS}"

networks:
  proxy:
    external: true
