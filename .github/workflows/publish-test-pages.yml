name: Publish corp test Pages mirror

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: corp-www-test-pages
  cancel-in-progress: false

env:
  TARGET_REPOSITORY: EtalSolutionsLLC/corp-www-test-pages
  SOURCE_PATH: deploy/dev/www

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Verify mirror credentials
        env:
          PAGES_MIRROR_TOKEN: ${{ secrets.PAGES_MIRROR_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${PAGES_MIRROR_TOKEN}" ]]; then
            echo "::error::PAGES_MIRROR_TOKEN is not configured."
            exit 1
          fi

      - name: Check out authoritative source
        uses: actions/checkout@v7
        with:
          path: source
          persist-credentials: false

      - name: Validate static DEV artifact
        run: |
          set -euo pipefail

          artifact_root="source/${SOURCE_PATH}"

          if [[ ! -d "${artifact_root}" ]]; then
            echo "::error::DEV static artifact directory does not exist: ${artifact_root}"
            exit 1
          fi

          if [[ ! -f "${artifact_root}/index.html" ]]; then
            echo "::error::DEV static artifact is missing index.html."
            exit 1
          fi

          if find "${artifact_root}" -type l -print -quit | grep -q .; then
            echo "::error::Static artifact must not contain symbolic links."
            exit 1
          fi

          forbidden="$(
            find "${artifact_root}" -type f \
              \( -name '.env' -o -name '*.pem' -o -name '*.key' -o -name 'id_rsa*' \) \
              -print
          )"

          if [[ -n "${forbidden}" ]]; then
            echo "::error::Static artifact contains forbidden files:"
            printf '%s\n' "${forbidden}"
            exit 1
          fi

      - name: Check out public test mirror
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.PAGES_MIRROR_TOKEN }}
          path: mirror
          fetch-depth: 0

      - name: Replace mirror contents
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git/' \
            "source/${SOURCE_PATH}/" \
            mirror/

          touch mirror/.nojekyll
          rm -f mirror/CNAME

      - name: Commit sanitized DEV publication artifact
        working-directory: mirror
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Test mirror already matches ${SOURCE_REPOSITORY}@${SOURCE_COMMIT}."
            exit 0
          fi

          git commit -m "publish test: ${SOURCE_REPOSITORY}@${SOURCE_COMMIT}"
          git push origin HEAD:main
