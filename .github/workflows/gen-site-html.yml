name: Generate site HTML

on:
  workflow_dispatch:
    inputs:
      rotation_date:
        description: "Optional Transformation Thread rotation date (YYYY-MM-DD). Leave blank to use today in the configured timezone."
        required: false
        type: string
  schedule:
    - cron: "5 4,5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gen-site-html
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    outputs:
      should_deploy: ${{ steps.rotation.outputs.should_build }}

    env:
      PM_VERSION_ROOT: ${{ github.workspace }}/site

    defaults:
      run:
        shell: bash
        working-directory: site/deploy/prd

    steps:
      - name: Check out website
        uses: actions/checkout@v7
        with:
          path: site
          fetch-depth: 0

      - name: Read Portmason tooling revision
        id: portmason-ref
        working-directory: site
        run: |
          set -euo pipefail

          if [[ ! -r .portmason-tooling-ref ]]; then
            echo "::error::.portmason-tooling-ref is missing or unreadable"
            exit 1
          fi

          ref="$(tr -d '[:space:]' < .portmason-tooling-ref)"
          ref="${ref,,}"

          if [[ ! "${ref}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::.portmason-tooling-ref must contain one full 40-character Git commit SHA"
            exit 1
          fi

          echo "sha=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Verify ops-and-sops credentials
        working-directory: .
        env:
          OPS_AND_SOPS_READ_TOKEN: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${OPS_AND_SOPS_READ_TOKEN}" ]]; then
            echo "::error::OPS_AND_SOPS_READ_TOKEN is not configured"
            exit 1
          fi

      - name: Check out ops-and-sops
        uses: actions/checkout@v7
        with:
          repository: domer6811/ops-and-sops
          ref: ${{ steps.portmason-ref.outputs.sha }}
          token: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
          path: ops-and-sops
          sparse-checkout: |
            ops/portmason
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Register Portmason tooling
        working-directory: .
        run: |
          set -euo pipefail

          portmason_share="${GITHUB_WORKSPACE}/ops-and-sops/ops/portmason"

          if [[ ! -d "${portmason_share}" ]]; then
            echo "::error::Portmason tooling directory is missing: ${portmason_share}"
            exit 1
          fi

          if [[ ! -r "${portmason_share}/pm-helpers" ]]; then
            echo "::error::Shared pm-helpers is missing or unreadable: ${portmason_share}/pm-helpers"
            exit 1
          fi

          if [[ ! -x "${portmason_share}/pm-version" ]]; then
            echo "::error::Shared pm-version is missing or not executable: ${portmason_share}/pm-version"
            exit 1
          fi

          echo "${portmason_share}" >> "${GITHUB_PATH}"
          echo "PORTMASON_SHARE=${portmason_share}" >> "${GITHUB_ENV}"

      - name: Verify repository automation
        working-directory: site
        run: |
          set -euo pipefail

          required_scripts=(
            bin/rotate-transformation-thread
            bin/report-blog-rotation
          )

          for script in "${required_scripts[@]}"; do
            if [[ ! -x "${script}" ]]; then
              echo "Required repository automation is missing or not executable: ${script}" >&2
              exit 1
            fi
          done

          if [[ -e bin/pm-version ]]; then
            echo "Project-local bin/pm-version must not exist; use shared ops-and-sops tooling." >&2
            exit 1
          fi

          expected_pm_version="${GITHUB_WORKSPACE}/ops-and-sops/ops/portmason/pm-version"
          actual_pm_version="$(command -v pm-version)"

          if [[ "${actual_pm_version}" != "${expected_pm_version}" ]]; then
            echo "Unexpected pm-version executable: ${actual_pm_version}" >&2
            echo "Expected: ${expected_pm_version}" >&2
            exit 1
          fi

          expected_tooling_ref="$(tr -d '[:space:]' < .portmason-tooling-ref)"
          expected_tooling_ref="${expected_tooling_ref,,}"

          actual_tooling_ref="$(
            git -C "${GITHUB_WORKSPACE}/ops-and-sops" rev-parse HEAD
          )"

          if [[ "${actual_tooling_ref}" != "${expected_tooling_ref}" ]]; then
            echo "Checked-out Portmason revision does not match .portmason-tooling-ref" >&2
            echo "Expected: ${expected_tooling_ref}" >&2
            echo "Actual:   ${actual_tooling_ref}" >&2
            exit 1
          fi

          bash -n "${expected_pm_version}"
          pm-version validate

      - name: Unit test shared build metadata integration
        working-directory: site
        run: |
          set -euo pipefail
          python3 -m unittest tests.test_site_build_shared_tooling

      - name: Rotate Transformation Thread selection
        id: rotation
        env:
          WORKFLOW_EVENT: ${{ github.event_name }}
          ROTATION_DATE: ${{ github.event.inputs.rotation_date || '' }}
        run: |
          set -euo pipefail

          rotation_args=(
            --collection www/collections/transformation-thread/collection.json
          )

          if [[ "${WORKFLOW_EVENT}" == "workflow_dispatch" ]]; then
            rotation_args+=(--force)

            if [[ -n "${ROTATION_DATE}" ]]; then
              rotation_args+=(--date "${ROTATION_DATE}")
              echo "Manual Transformation Thread rotation override: ${ROTATION_DATE}"
            else
              echo "Manual Transformation Thread rotation override: configured-timezone today"
            fi
          else
            rotation_args+=(--require-local-midnight-window)
            echo "Scheduled Transformation Thread rotation with local-midnight guard"
          fi

          rotation_output="$(
            ../../bin/rotate-transformation-thread \
              "${rotation_args[@]}" \
              2>&1
          )"

          printf '%s\n' "${rotation_output}"

          if grep -q \
            '^Outside local midnight rotation window:' \
            <<<"${rotation_output}"
          then
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
            echo "No artifact will be built or deployed for this guard run."
          else
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit rotation source state
        if: ${{ steps.rotation.outputs.should_build == 'true' && !env.ACT }}
        working-directory: site
        run: |
          set -euo pipefail

          rotation_paths=(
            deploy/prd/www/collections/transformation-thread/generated/selection.json
            deploy/prd/www/collections/transformation-thread/items
          )

          if ! git diff --quiet -- "${rotation_paths[@]}"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add -f "${rotation_paths[@]}"
            git commit -m "chore: rotate Transformation Thread"
            git push
          fi

      - name: Allocate immutable site build
        if: ${{ steps.rotation.outputs.should_build == 'true' }}
        working-directory: site
        env:
          CI: "true"
        run: |
          set -euo pipefail

          # pm-version owns allocation. Do not capture stdout because shared
          # Portmason logging is intentionally human-readable.
          pm-version build allocate --ci

          # Read the authoritative machine value from the file pm-version wrote.
          build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          compatibility_version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${build_number}" =~ ^[0-9]+$ ]]; then
            echo "::error::BUILD_NUMBER contains an invalid value: ${build_number}"
            exit 1
          fi

          if [[ "${compatibility_version}" != "${build_number}" ]]; then
            echo "::error::VERSION does not match BUILD_NUMBER"
            echo "::error::BUILD_NUMBER=${build_number}; VERSION=${compatibility_version}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            RELEASE_VERSION \
            BUILD_NUMBER \
            VERSION \
            deploy/*/RELEASE_VERSION \
            deploy/*/BUILD_NUMBER \
            deploy/*/VERSION

          git commit -m "chore: allocate site build ${build_number}"
          git push

          {
            echo "PM_BUILD_NUMBER=${build_number}"
            echo "PM_SOURCE_COMMIT=$(git rev-parse HEAD)"
          } >> "${GITHUB_ENV}"

      - name: Verify deployment basics
        if: ${{ steps.rotation.outputs.should_build == 'true' }}
        working-directory: site
        run: |
          set -euo pipefail

          bash tests/verify-compose-contract
          bash tests/verify-production-entrypoints

      - name: Generate production site HTML
        if: ${{ steps.rotation.outputs.should_build == 'true' }}
        env:
          PM_DEPLOYMENT_ID: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          docker compose \
            -f docker-compose.yml \
            run --rm \
            --volume "${PORTMASON_SHARE}:/workspace/portmason:ro" \
            -e SITE_DIR=/workspace/www \
            -e GITHUB_ACTIONS=true \
            -e PM_OFFICIAL_BUILD=true \
            -e PM_DEFER_SITE_BUILD_FINALIZE=true \
            -e PM_SOURCE_COMMIT="${PM_SOURCE_COMMIT}" \
            -e PM_SOURCE_DIRTY=false \
            -e PM_DEPLOY_ENV=github-pages \
            -e PM_DEPLOYMENT_ID="${PM_DEPLOYMENT_ID}" \
            toolbox \
            sh -lc 'exec python3 "$PORTMASON_SHARE/pm-process-site-partials"'

          PM_OFFICIAL_BUILD=true \
          PM_SOURCE_COMMIT="${PM_SOURCE_COMMIT}" \
          PM_SOURCE_DIRTY=false \
          PM_DEPLOY_ENV=github-pages \
          PM_DEPLOYMENT_ID="${PM_DEPLOYMENT_ID}" \
            pm-version build finalize \
              --site-dir "${PWD}/www" \
              --environment github-pages \
              --deployment-id "${PM_DEPLOYMENT_ID}"

      - name: Verify Pages artifact readability
        if: ${{ steps.rotation.outputs.should_build == 'true' }}
        working-directory: site
        run: |
          set -euo pipefail

          artifact_root="deploy/prd/www"

          required_metadata=(
            "${artifact_root}/build-info.json"
            "${artifact_root}/deploy-info.json"
            "${artifact_root}/artifact-manifest.json"
          )

          for metadata_file in "${required_metadata[@]}"; do
            if [[ ! -f "${metadata_file}" ]]; then
              echo "Pages artifact is missing required metadata: ${metadata_file}" >&2
              exit 1
            fi

            if [[ ! -r "${metadata_file}" ]]; then
              echo "Pages metadata is not readable by the GitHub runner:" >&2
              stat "${metadata_file}" >&2 || true
              exit 1
            fi

            mode="$(stat -c '%a' "${metadata_file}")"

            if [[ "${mode}" != "644" ]]; then
              echo "Pages metadata has mode ${mode}; expected 644: ${metadata_file}" >&2
              exit 1
            fi
          done

          pm-version deployment verify \
            --site-dir "${artifact_root}"

          unreadable_files="$(
            find "${artifact_root}" \
              -type f \
              ! -readable \
              -print
          )"

          if [[ -n "${unreadable_files}" ]]; then
            echo "Pages artifact contains unreadable files:" >&2
            printf '%s\n' "${unreadable_files}" >&2
            exit 1
          fi

          tar -C "${artifact_root}" -cf /dev/null .

      - name: Report blog entry rotation
        if: ${{ steps.rotation.outputs.should_build == 'true' }}
        run: ../../bin/report-blog-rotation

      - name: Commit generated production site HTML
        if: ${{ steps.rotation.outputs.should_build == 'true' && !env.ACT }}
        working-directory: site
        run: |
          set -euo pipefail

          generated_paths=(
            deploy/prd/www/index.html
          )

          if git diff --quiet -- "${generated_paths[@]}"; then
            echo "Production site HTML is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f "${generated_paths[@]}"
          git commit \
            -m "chore: generate production site HTML for build ${PM_BUILD_NUMBER}"
          git push

      - name: Upload GitHub Pages artifact
        if: ${{ steps.rotation.outputs.should_build == 'true' && !env.ACT }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/deploy/prd/www

  deploy:
    if: ${{ needs.generate.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    needs: generate

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ !env.ACT }}
        uses: actions/deploy-pages@v5
