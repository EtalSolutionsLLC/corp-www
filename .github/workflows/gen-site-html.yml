name: Generate site HTML

on:
  workflow_dispatch:
    inputs:
      rotation_date:
        description: "Optional Transformation Thread rotation date (YYYY-MM-DD). Leave blank to use today in the configured timezone."
        required: false
        type: string
  schedule:
    - cron: "5 4,5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gen-site-html
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: deploy/prd

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Rotate Transformation Thread selection
        shell: bash
        env:
          WORKFLOW_EVENT: ${{ github.event_name }}
          ROTATION_DATE: ${{ github.event.inputs.rotation_date || '' }}
        run: |
          rotation_args=(
            --config www/content/transformation-thread-posts.json
            --selection www/content/transformation-thread-selection.json
            --partial www/partials/transformation-thread.html
          )

          if [[ "$WORKFLOW_EVENT" == "workflow_dispatch" ]]; then
            rotation_args+=(--force)

            if [[ -n "$ROTATION_DATE" ]]; then
              rotation_args+=(--date "$ROTATION_DATE")
              echo "Manual Transformation Thread rotation override: $ROTATION_DATE"
            else
              echo "Manual Transformation Thread rotation override: configured-timezone today"
            fi
          else
            rotation_args+=(--require-local-midnight-window)
            echo "Scheduled Transformation Thread rotation with local-midnight guard"
          fi

          ../../bin/rotate-transformation-thread "${rotation_args[@]}"

      - name: Generate production site HTML
        run: |
          docker compose \
            -f docker-compose.yml \
            run --rm \
            -e SITE_DIR=/workspace/www \
            toolbox \
            portmason/pm-process-site-partials

      - name: Report blog entry rotation
        run: ./bin/report-blog-rotation

      - name: Commit generated production site HTML
        if: ${{ !env.ACT }}
        shell: bash
        working-directory: .
        run: |
          if git diff --quiet -- deploy/prd/www; then
            echo "Production site HTML is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f deploy/prd/www
          git commit -m "chore: generate production site HTML"
          git push

      - name: Upload GitHub Pages artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/prd/www

  deploy:
    runs-on: ubuntu-latest
    needs: generate

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        uses: actions/deploy-pages@v4
