name: Generate site HTML

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC.
    # 12:05 AM Eastern during daylight saving time = 04:05 UTC.
    # 12:05 AM Eastern during standard time = 05:05 UTC.
    - cron: "5 4,5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: generate-site-html
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate production site HTML
        run: |
          docker compose run --rm \
            --workdir /deploy/prd \
            -e SITE_DIR=/workspace/www \
            toolbox \
            /workspace/portmason/pm-process-site-partials

      - name: Commit generated production site HTML
        shell: bash
        run: |
          if git diff --quiet -- deploy/prd/www; then
            echo "Production site HTML is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f deploy/prd/www
          git commit -m "chore: generate production site HTML"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/prd/www

  deploy:
    runs-on: ubuntu-latest
    needs: generate

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
