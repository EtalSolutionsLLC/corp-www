name: setup-maintain-deploy-via-portmason

on:
  workflow_dispatch:
    inputs:
      collection_date:
        description: "Optional publication collection date (YYYY-MM-DD). Leave blank for today in each collection timezone."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: portmason-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest

    env:
      PROJECT_DIR: site
      DEPLOY_DIR: site/deploy/prd
      PAGES_SITE_DIR: site/deploy/prd/www
      OPS_DIR: ops-and-sops

    steps:
      - name: Check out project
        uses: actions/checkout@v4
        with:
          path: ${{ env.PROJECT_DIR }}
          fetch-depth: 0

      - name: Resolve Portmason tooling revision
        id: portmason-ref
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          ref_file=".portmason-tooling-ref"
          ref="main"

          if [[ -r "${ref_file}" ]]; then
            configured_ref="$(tr -d '[:space:]' < "${ref_file}")"
            configured_ref="${configured_ref,,}"
            if [[ -n "${configured_ref}" ]]; then
              [[ "${configured_ref}" =~ ^[0-9a-f]{40}$ ]] || {
                echo "::error::${ref_file} must be empty or contain one full 40-character Git commit SHA"
                exit 1
              }
              ref="${configured_ref}"
            fi
          fi

          printf 'ref=%s\n' "${ref}" >> "${GITHUB_OUTPUT}"

      - name: Check out Portmason tooling
        uses: actions/checkout@v4
        with:
          repository: domer6811/ops-and-sops
          ref: ${{ steps.portmason-ref.outputs.ref }}
          token: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
          path: ${{ env.OPS_DIR }}
          sparse-checkout: |
            ops/portmason
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Register Portmason
        shell: bash
        run: |
          set -euo pipefail

          portmason_share="${GITHUB_WORKSPACE}/${OPS_DIR}/ops/portmason"

          [[ -d "${portmason_share}" ]] || {
            echo "::error::Portmason directory is missing: ${portmason_share}"
            exit 1
          }

          [[ -x "${portmason_share}/pm-setup" ]] || {
            echo "::error::pm-setup is missing or not executable"
            exit 1
          }

          printf 'PORTMASON_SHARE=%s\n' "${portmason_share}" >> "${GITHUB_ENV}"
          printf '%s\n' "${portmason_share}" >> "${GITHUB_PATH}"

      - name: Run Portmason setup
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        env:
          GITHUB_ACTIONS: "true"
          PM_NO_REDIRECT: "1"
          PM_OFFICIAL_BUILD: "true"
          PM_SOURCE_COMMIT: ${{ github.sha }}
          PM_SOURCE_DIRTY: "false"
          PM_DEPLOYMENT_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          PM_STATIC_COLLECTION_DATE: ${{ inputs.collection_date || '' }}
        run: |
          set -euo pipefail

          "${PORTMASON_SHARE}/pm-setup"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_SITE_DIR }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs:
      - setup

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
