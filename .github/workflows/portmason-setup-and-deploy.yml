name: setup-maintain-deploy-via-portmason

on:
  workflow_dispatch:
    inputs:
      collection_date:
        description: "Optional publication collection date (YYYY-MM-DD). Leave blank for today in each collection timezone."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: portmason-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest

    env:
      PROJECT_DIR: site
      DEPLOY_DIR: site/deploy/prd
      PAGES_SITE_DIR: site/deploy/prd/www
      OPS_DIR: ops-and-sops
      OPS_AND_SOPS_READ_TOKEN_2: ${{ secrets.OPS_AND_SOPS_READ_TOKEN_2 }}

    steps:
      - name: Check out project
        uses: actions/checkout@v4
        with:
          path: ${{ env.PROJECT_DIR }}
          fetch-depth: 0

      - name: Install Portmason tooling
        shell: bash
        run: |
          set -euo pipefail

          [[ -n "${OPS_AND_SOPS_READ_TOKEN_2}" ]] || {
            echo "::error::OPS_AND_SOPS_READ_TOKEN_2 is required to read private domer6811/ops-and-sops"
            exit 1
          }

          GITHUB_TOKEN=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

          git clone --filter=blob:none --sparse git@github.com:domer6811/ops-and-sops.git $OPS_DIR
          cd $OPS_DIR
          git sparse-checkout set ops/portmason

          portmason_share="${GITHUB_WORKSPACE}/${OPS_DIR}/ops/portmason"

          [[ -d "${portmason_share}" ]] || {
            echo "::error::Portmason directory is missing: ${portmason_share}"
            exit 1
          }

          [[ -x "${portmason_share}/pm-setup" ]] || {
            echo "::error::pm-setup is missing or not executable"
            exit 1
          }

          printf 'PORTMASON_SHARE=%s\n' "${portmason_share}" >> "${GITHUB_ENV}"
          printf '%s\n' "${portmason_share}" >> "${GITHUB_PATH}"

      - name: Run Portmason setup
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        env:
          GITHUB_ACTIONS: "true"
          PM_NO_REDIRECT: "1"
          PM_OFFICIAL_BUILD: "true"
          PM_SOURCE_COMMIT: ${{ github.sha }}
          PM_SOURCE_DIRTY: "false"
          PM_DEPLOYMENT_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          PM_STATIC_COLLECTION_DATE: ${{ inputs.collection_date || '' }}
        run: |
          set -euo pipefail

          pm-setup

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_SITE_DIR }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs:
      - setup

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
