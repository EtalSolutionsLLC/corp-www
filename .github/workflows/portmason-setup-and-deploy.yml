name: setup-maintain-deploy-via-portmason

on:
  workflow_dispatch:
    inputs:
      collection_date:
        description: "Optional publication collection date (YYYY-MM-DD). Leave blank for today in each collection timezone."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: portmason-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest

    env:
      PROJECT_DIR: site
      DEPLOY_DIR: site/deploy/prd
      PAGES_SITE_DIR: site/deploy/prd/www
      OPS_DIR: ops-and-sops
      OPS_AND_SOPS_READ_TOKEN: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}

    steps:
      - name: Check out project
        uses: actions/checkout@v4
        with:
          path: ${{ env.PROJECT_DIR }}
          fetch-depth: 0

      - name: Install Portmason tooling
        shell: bash
        run: |
          set -euo pipefail

          [[ -n "${OPS_AND_SOPS_READ_TOKEN}" ]] || {
            echo "::error::OPS_AND_SOPS_READ_TOKEN is required to read private domer6811/ops-and-sops"
            exit 1
          }

          ref_file="${PROJECT_DIR}/.portmason-tooling-ref"
          ref="main"
          if [[ -r "${ref_file}" ]]; then
            configured_ref="$(tr -d '[:space:]' < "${ref_file}")"
            configured_ref="${configured_ref,,}"
            if [[ -n "${configured_ref}" ]]; then
              [[ "${configured_ref}" =~ ^[0-9a-f]{40}$ ]] || {
                echo "::error::.portmason-tooling-ref must be empty or contain one full 40-character Git commit SHA"
                exit 1
              }
              ref="${configured_ref}"
            fi
          fi

          mkdir -p "${OPS_DIR}"
          archive="${RUNNER_TEMP}/ops-and-sops.tar.gz"
          export GITHUB_TOKEN="${OPS_AND_SOPS_READ_TOKEN}"

          gh api \
            "repos/domer6811/ops-and-sops/tarball/${ref}" \
            > "${archive}"

          tar -xzf "${archive}" \
            --strip-components=1 \
            --wildcards '*/ops/portmason/*' \
            -C "${OPS_DIR}"

          portmason_share="${GITHUB_WORKSPACE}/${OPS_DIR}/ops/portmason"

          [[ -d "${portmason_share}" ]] || {
            echo "::error::Portmason directory is missing: ${portmason_share}"
            exit 1
          }

          [[ -x "${portmason_share}/pm-setup" ]] || {
            echo "::error::pm-setup is missing or not executable"
            exit 1
          }

          printf 'PORTMASON_SHARE=%s\n' "${portmason_share}" >> "${GITHUB_ENV}"
          printf '%s\n' "${portmason_share}" >> "${GITHUB_PATH}"

      - name: Run Portmason setup
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        env:
          GITHUB_ACTIONS: "true"
          PM_NO_REDIRECT: "1"
          PM_OFFICIAL_BUILD: "true"
          PM_SOURCE_COMMIT: ${{ github.sha }}
          PM_SOURCE_DIRTY: "false"
          PM_DEPLOYMENT_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          PM_STATIC_COLLECTION_DATE: ${{ inputs.collection_date || '' }}
        run: |
          set -euo pipefail

          pm-setup

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_SITE_DIR }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs:
      - setup

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
