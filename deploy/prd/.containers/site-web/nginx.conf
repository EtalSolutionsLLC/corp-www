server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|json|woff|woff2)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }
}
